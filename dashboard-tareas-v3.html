<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snoopy — Tablero de Tareas</title>
  <script>
    // Sincronizar tareas desde backend
    const BACKEND_URL = 'https://snoopy-tasks-production.up.railway.app';
    let isSyncing = false;

    // Normaliza cualquier formato de tarea (viejo o nuevo) al formato canónico
    function normalizeTask(t) {
      return {
        id: t.id,
        category: t.category || 'Sin categoría',
        title: t.title || t.description || 'Sin título',
        state: t.state || (t.status === 'Por hacer' ? 'todo' : t.status) || 'todo',
        delegated: t.delegated !== undefined ? t.delegated : (t.assigned || null),
        date: t.date || (t.created ? t.created.split('T')[0] : '2026-07-02')
      };
    }

    function stableKey(list) {
      return JSON.stringify(
        list.map(normalizeTask).sort((a, b) => String(a.id).localeCompare(String(b.id)))
      );
    }

    async function syncTasksFromBackend() {
      if (isSyncing) return;
      try {
        isSyncing = true;
        const response = await fetch(`${BACKEND_URL}/api/tasks`);
        if (!response.ok) return;

        const data = await response.json();
        const remoteTasks = (data.tasks || []).map(normalizeTask);

        // GUARDA: nunca sobrescribir con un remoto vacío (evita pérdida total)
        if (remoteTasks.length === 0) {
          console.log('Sync: remoto vacío, se ignora para proteger datos locales');
          return;
        }

        const localTasks = JSON.parse(localStorage.getItem('snoopy-tasks-v3') || '[]');

        if (stableKey(localTasks) !== stableKey(remoteTasks)) {
          localStorage.setItem('snoopy-tasks-v3', JSON.stringify(remoteTasks));
          if (window.tasksUpdated) window.tasksUpdated();
          console.log('Sync: datos actualizados desde backend');
        }
      } catch (error) {
        console.log('Sync: sin conexión al backend');
      } finally {
        isSyncing = false;
      }
    }

    // Sincronizar cada 15 segundos
    setInterval(syncTasksFromBackend, 15000);
  </script>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --border: #e9eef5;
      --border-soft: #f1f5f9;
      --ink: #1e293b;
      --ink-soft: #64748b;
      --ink-faint: #94a3b8;
      --brand: #1fa8a6;
      --brand-deep: #0d7a93;
      --brand-navy: #003d5c;
      --st-todo: #6366f1;
      --st-progress: #0ea5e9;
      --st-done: #10b981;
      --st-parked: #94a3b8;
      --radius: 18px;
      --shadow: 0 1px 3px rgba(16, 24, 40, 0.04), 0 1px 2px rgba(16, 24, 40, 0.03);
      --shadow-lg: 0 12px 32px rgba(16, 24, 40, 0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== LAYOUT ===== */
    .app-shell { display: flex; min-height: 100vh; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 246px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px 18px;
      font-size: 19px;
      font-weight: 700;
      color: var(--brand-navy);
      letter-spacing: -0.4px;
    }

    .brand-logo {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-navy) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .nav-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--ink-faint);
      padding: 12px 12px 6px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px; font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.15s;
      border: none; background: none; width: 100%; text-align: left;
      font-family: inherit;
    }
    .nav-item .nav-ic { font-size: 17px; width: 20px; text-align: center; }
    .nav-item:hover { background: var(--border-soft); color: var(--ink); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(31,168,166,0.12), rgba(0,61,92,0.08));
      color: var(--brand-deep); font-weight: 600;
    }
    .nav-item.soon { opacity: 0.55; }
    .nav-item.soon .soon-tag {
      margin-left: auto; font-size: 9px; font-weight: 700;
      background: var(--border-soft); color: var(--ink-faint);
      padding: 2px 7px; border-radius: 20px; text-transform: uppercase;
    }

    .sidebar-footer {
      margin-top: auto;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 10px;
      border-top: 1px solid var(--border-soft);
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), var(--brand-navy));
      color: white; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
    }
    .sidebar-footer .u-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .sidebar-footer .u-role { font-size: 11px; color: var(--ink-faint); }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      padding: 28px 34px 60px;
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
      min-width: 0;
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; margin-bottom: 26px; flex-wrap: wrap;
    }
    .greeting-eyebrow {
      font-size: 12px; color: var(--ink-faint); font-weight: 500;
      text-transform: capitalize;
    }
    .greeting { font-size: 27px; font-weight: 700; color: var(--ink); letter-spacing: -0.6px; }
    .greeting-sub { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .search {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 9px 14px; width: 260px;
      transition: all 0.2s;
    }
    .search:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(31,168,166,0.1); }
    .search svg { flex-shrink: 0; }
    .search input {
      border: none; outline: none; background: none; font-size: 13px;
      font-family: inherit; color: var(--ink); width: 100%;
    }
    .search input::placeholder { color: var(--ink-faint); }

    .btn {
      padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
      border: 1px solid var(--border); background: var(--surface); color: var(--ink);
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn:hover { border-color: var(--brand); color: var(--brand-deep); }
    .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-primary:hover { background: var(--brand-deep); border-color: var(--brand-deep); color: #fff; }

    /* ===== STATS ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px; margin-bottom: 26px;
    }
    .stat-tile {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow);
    }
    .stat-icon {
      width: 46px; height: 46px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      flex-shrink: 0;
    }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--ink); line-height: 1; }
    .stat-label { font-size: 12px; color: var(--ink-soft); margin-top: 4px; font-weight: 500; }

    /* ===== NEW TASK FORM ===== */
    .new-task-form {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px 22px; margin-bottom: 24px;
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .form-title {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--ink-faint); margin-bottom: 14px;
    }
    .form-row {
      display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: end;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.3px; color: var(--ink-faint);
    }
    .form-group input, .form-group select {
      padding: 11px 13px; border: 1px solid var(--border); border-radius: 11px;
      font-size: 13px; font-family: inherit; color: var(--ink); background: var(--surface);
    }
    .form-group input::placeholder { color: var(--ink-faint); }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(31,168,166,0.1);
    }
    #task-category-input { min-width: 170px; }
    #add-task-btn {
      padding: 11px 22px; background: var(--brand); color: white; border: none;
      border-radius: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 13px;
    }
    #add-task-btn:hover { background: var(--brand-deep); }

    /* ===== TABS ===== */
    .tabs { display: flex; gap: 4px; margin-bottom: 22px; background: var(--surface);
      padding: 5px; border-radius: 13px; border: 1px solid var(--border); width: fit-content; }
    .tab-btn {
      padding: 9px 18px; border: none; background: transparent; font-size: 13px;
      font-weight: 600; color: var(--ink-soft); cursor: pointer; border-radius: 9px;
      transition: all 0.2s; font-family: inherit;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--brand-deep); background: rgba(31,168,166,0.12); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeUp 0.25s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== CATEGORY VIEW ===== */
    .categories-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px;
    }
    .category-card {
      background: var(--surface); border-radius: var(--radius); padding: 18px 18px 6px;
      border: 1px solid var(--border); box-shadow: var(--shadow); transition: all 0.25s;
    }
    .category-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .category-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border-soft);
    }
    .category-indicator { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .category-name { font-size: 14px; font-weight: 700; flex: 1; letter-spacing: -0.2px; }
    .category-count { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }

    .task-item {
      background: #fbfcfe; border-radius: 12px; padding: 13px 14px; margin-bottom: 10px;
      font-size: 13px; cursor: pointer; transition: all 0.18s;
      border: 1px solid var(--border-soft); border-left: 3px solid var(--ink-faint);
    }
    .task-item:hover { background: #f6f9fc; box-shadow: 0 3px 10px rgba(16,24,40,0.06); transform: translateX(2px); }
    .task-item.state-todo { border-left-color: var(--st-todo); }
    .task-item.state-progress { border-left-color: var(--st-progress); }
    .task-item.state-done { border-left-color: var(--st-done); opacity: 0.72; }
    .task-item.state-parked { border-left-color: var(--st-parked); opacity: 0.62; }
    .task-title { font-weight: 500; margin-bottom: 9px; line-height: 1.35; color: var(--ink); }
    .task-meta { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .task-state {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 700;
      background: var(--border-soft); color: var(--ink-soft); padding: 3px 9px; border-radius: 20px;
    }
    .task-delegated {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 700;
      background: rgba(31,168,166,0.12); color: var(--brand-deep); padding: 3px 9px; border-radius: 20px;
    }
    .task-date { font-size: 11px; color: var(--ink-faint); font-variant-numeric: tabular-nums; margin-left: auto; }

    /* Avatar de persona asignada */
    .assignee {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; color: var(--ink-soft);
      background: var(--border-soft); padding: 2px 9px 2px 2px; border-radius: 20px;
    }
    .assignee-dot {
      width: 17px; height: 17px; border-radius: 50%; color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700;
    }

    /* ===== KANBAN VIEW ===== */
    .kanban-container {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 18px;
    }
    .kanban-column {
      background: #f8fafc; border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; display: flex; flex-direction: column;
    }
    .kanban-header {
      padding: 14px 16px; font-weight: 700; font-size: 13px; color: #fff;
      display: flex; align-items: center; gap: 10px; letter-spacing: 0.2px;
    }
    .kanban-header.state-todo { background: var(--st-todo); }
    .kanban-header.state-progress { background: var(--st-progress); }
    .kanban-header.state-done { background: var(--st-done); }
    .kanban-header.state-parked { background: var(--st-parked); }
    .kanban-indicator { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.85); }
    .kanban-count {
      margin-left: auto; font-size: 12px; background: rgba(255,255,255,0.25);
      color: #fff; padding: 2px 11px; border-radius: 20px; font-weight: 700;
    }
    .kanban-cards {
      padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 12px;
      min-height: 90px; max-height: 66vh; overflow-y: auto;
    }
    .kanban-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px; cursor: pointer; transition: all 0.18s; border-left: 3px solid var(--ink-faint);
      box-shadow: 0 1px 2px rgba(16,24,40,0.03);
    }
    .kanban-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .kanban-card.state-todo { border-left-color: var(--st-todo); }
    .kanban-card.state-progress { border-left-color: var(--st-progress); }
    .kanban-card.state-done { border-left-color: var(--st-done); }
    .kanban-card.state-parked { border-left-color: var(--st-parked); }
    .kanban-card-title { font-weight: 600; margin-bottom: 10px; font-size: 13px; line-height: 1.35; color: var(--ink); }
    .kanban-card-meta { display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: var(--ink-soft); }

    .empty-state { text-align: center; padding: 24px 16px; color: var(--ink-faint); font-size: 13px; }

    /* ===== MODAL ===== */
    .modal {
      display: none; position: fixed; z-index: 1000; inset: 0;
      background: rgba(15, 23, 42, 0.45); animation: fadeIn 0.2s; backdrop-filter: blur(2px);
    }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content {
      background: var(--surface); border-radius: 20px; padding: 26px; max-width: 420px; width: 90%;
      box-shadow: var(--shadow-lg); animation: slideIn 0.25s;
    }
    @keyframes slideIn { from { transform: translateY(-16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 16px; }
    .modal-task-name {
      font-size: 13px; color: var(--ink-soft); margin-bottom: 22px; padding: 13px;
      background: var(--border-soft); border-radius: 11px; border-left: 3px solid var(--brand);
    }
    .modal-section { margin-bottom: 20px; }
    .modal-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
      color: var(--ink-faint); margin-bottom: 10px; display: block;
    }
    .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .modal-btn {
      padding: 9px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface);
      font-size: 12px; cursor: pointer; transition: all 0.18s; font-weight: 600; color: var(--ink-soft);
      font-family: inherit;
    }
    .modal-btn:hover { border-color: var(--brand); color: var(--brand-deep); }
    .modal-btn.selected { background: var(--brand); color: white; border-color: var(--brand); }
    .modal-actions { display: flex; gap: 9px; margin-top: 22px; }
    .modal-close, .modal-save {
      flex: 1; padding: 11px; border: 1px solid var(--border); border-radius: 11px;
      font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.18s; font-family: inherit;
    }
    .modal-close { background: var(--surface); color: var(--ink); }
    .modal-close:hover { border-color: var(--ink-soft); }
    .modal-save { background: var(--brand); color: white; border-color: var(--brand); }
    .modal-save:hover { background: var(--brand-deep); border-color: var(--brand-deep); }

    /* ===== SETTINGS BADGE ===== */
    .settings-badge {
      position: fixed; bottom: 22px; right: 22px; background: var(--brand-navy); color: white;
      width: 48px; height: 48px; border-radius: 50%; font-size: 20px; cursor: pointer;
      transition: all 0.2s; box-shadow: 0 6px 18px rgba(0,61,92,0.35);
      display: flex; align-items: center; justify-content: center; z-index: 900;
    }
    .settings-badge:hover { background: var(--brand-deep); transform: translateY(-3px) rotate(45deg); }
    .settings-modal { display: none; }
    .settings-modal.active { display: flex; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .app-shell { flex-direction: column; }
      .sidebar {
        width: 100%; height: auto; position: static; flex-direction: row;
        align-items: center; overflow-x: auto; padding: 12px 14px; gap: 4px;
      }
      .brand { padding: 6px 10px; }
      .nav-label, .sidebar-footer { display: none; }
      .nav-item { width: auto; white-space: nowrap; }
      .main { padding: 20px 18px 50px; }
    }
    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
      .search { width: 100%; }
      .topbar-right { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">🐶</div>
        <span>Snoopy</span>
      </div>

      <div class="nav-label">Espacio de trabajo</div>
      <button class="nav-item active"><span class="nav-ic">✅</span> Tareas</button>
      <button class="nav-item soon" onclick="showToast('Próximamente 🚧')"><span class="nav-ic">📊</span> Resumen <span class="soon-tag">Pronto</span></button>
      <button class="nav-item soon" onclick="showToast('Próximamente 🚧')"><span class="nav-ic">📁</span> Documentos <span class="soon-tag">Pronto</span></button>
      <button class="nav-item soon" onclick="showToast('Próximamente 🚧')"><span class="nav-ic">📈</span> Estadísticas <span class="soon-tag">Pronto</span></button>

      <div class="nav-label">General</div>
      <button class="nav-item soon" onclick="showToast('Próximamente 🚧')"><span class="nav-ic">🔔</span> Notificaciones <span class="soon-tag">Pronto</span></button>
      <button class="nav-item" onclick="document.getElementById('settings-modal').classList.add('active')"><span class="nav-ic">⚙️</span> Configuración</button>

      <div class="sidebar-footer">
        <div class="avatar">S</div>
        <div>
          <div class="u-name">Sebastián</div>
          <div class="u-role">Director de Marketing</div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <div>
          <div class="greeting-eyebrow" id="greeting-date"></div>
          <h1 class="greeting">Hola, Sebastián 👋</h1>
          <p class="greeting-sub">Esto es lo que tienes en el tablero hoy.</p>
        </div>
        <div class="topbar-right">
          <div class="search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="search-input" placeholder="Buscar tarea, categoría, persona...">
          </div>
          <button class="btn" id="export-btn">⬇ Exportar CSV</button>
        </div>
      </div>

      <!-- STATS -->
      <section class="stats-row" id="stats-row"></section>

      <!-- NUEVA TAREA -->
      <div class="new-task-form">
        <div class="form-title">Nueva tarea</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Descripción</label>
            <input type="text" id="task-title-input" placeholder="Escribe la tarea...">
          </div>
          <div class="form-group">
            <label class="form-label">Categoría</label>
            <select id="task-category-input">
              <option value="">Seleccionar...</option>
            </select>
          </div>
          <button id="add-task-btn">＋ Agregar</button>
        </div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="categorias">Mis tareas</button>
        <button class="tab-btn" data-tab="estados">Por estado</button>
      </div>

      <!-- TAB 1: POR CATEGORÍA -->

        <div class="categories-grid" id="categorias-grid"></div>

  </div>

  <!-- Modal para editar tarea -->
  <div class="modal" id="task-modal">
    <div class="modal-content">
      <div class="modal-title">Editar tarea</div>
      <div class="modal-task-name" id="modal-task-name"></div>

      <div class="modal-section">
        <label class="modal-label">Estado</label>
        <div class="modal-buttons" id="state-buttons"></div>
      </div>

      <div class="modal-section">
        <label class="modal-label">Delegar a</label>
        <div class="modal-buttons" id="delegate-buttons"></div>
      </div>

      <div class="modal-actions">
        <button class="modal-close" id="modal-close">Cancelar</button>
        <button class="modal-save" id="modal-save">Guardar</button>

  <!-- Modal de configuración Telegram -->
  <div class="modal settings-modal" id="settings-modal">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-title">Conectar Bot de Telegram</div>

      <div class="modal-section">
        <label class="modal-label">URL de tu Bot</label>
        <input type="text" id="telegram-bot-url" placeholder="https://tu-bot.up.railway.app" style="width: 100%; padding: 11px 13px; border: 1px solid #e9eef5; border-radius: 11px; font-size: 13px;">
        <p style="font-size: 11px; color: #94a3b8; margin-top: 8px;">Ej: https://snoopy-tasks-production.up.railway.app</p>
      </div>

      <div class="modal-section">
        <label class="modal-label">Estado</label>
        <div id="telegram-status" style="padding: 11px 13px; background: #f1f5f9; border-radius: 11px; font-size: 12px; color: #64748b;">
          Desconectado
        </div>
      </div>

      <div class="modal-actions">
        <button class="modal-close" id="settings-close">Cerrar</button>
        <button class="modal-save" id="settings-save">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Badge de configuración -->
  <div class="settings-badge" id="settings-badge" title="Configurar Telegram">⚙️</div>

  <script>
    const tasks = [
      { id: 1, category: 'Raw', title: 'Equivalencias de variedades - Llamada con Oto', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 2, category: 'Madrid', title: 'Conteo de devolución de Mono', state: 'todo', delegated: 'Sofi', date: '2026-07-02' },
      { id: 3, category: 'Actualización', title: 'Master Sales', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 4, category: 'Seguimiento', title: 'Exportación Chile con Oto', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 5, category: 'Raw', title: 'Seguimiento Vials', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 6, category: 'Actualización', title: 'Órdenes y equivalencias con las muestras: Barney\'s Farm, Sean…', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 7, category: 'Raw', title: 'Seguimiento Packaging', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 8, category: 'Raw', title: 'Stickers y hoodies', state: 'todo', delegated: 'Pau', date: '2026-07-02' },
      { id: 9, category: 'Madrid', title: 'Conteo de devoluciones de Toni', state: 'todo', delegated: 'Sofi', date: '2026-07-02' },
      { id: 10, category: 'Madrid', title: 'Conteo de devoluciones de Jens', state: 'todo', delegated: 'Sofi', date: '2026-07-02' },
      { id: 11, category: 'Madrid', title: 'Coordinación de devolución de Jens', state: 'todo', delegated: 'Sofi', date: '2026-07-02' },
      { id: 12, category: 'Oscar', title: 'Pruebas de germinación en Miami', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 13, category: 'Pao', title: 'Respuesta para David', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 14, category: 'IA', title: 'Terminar configuración de Ms. Bubbles sin automatización', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 15, category: 'IA', title: 'Carpetas de Marketing en Nelly organizadas', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 16, category: 'IA', title: 'Tablero de Manu, mejoras del departamento', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 17, category: 'IA', title: 'Automatización procesos de marketing de alphatype: Grow Diaries Card y Weekly Breeders Highlight', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 18, category: 'Raw', title: 'Brand Book de Raw', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 19, category: 'IA', title: 'Brand Book de alphatype', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 20, category: 'Marketing Alphatype', title: 'A15 campaña completa', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 21, category: 'IA', title: 'Skill de la generación de las fotos de las plantas', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 22, category: 'Actualización', title: 'Stock de Miami', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 23, category: 'Actualización', title: 'Updated global stock - clientes', state: 'todo', delegated: null, date: '2026-07-02' },
      { id: 24, category: 'Aparcado', title: 'Página web Alphatype y plataforma de clientes', state: 'parked', delegated: null, date: '2026-07-02' },
      { id: 25, category: 'Pao', title: 'Revisar las condiciones de precio con Jens', state: 'todo', delegated: null, date: '2026-07-02' }
    ];

    const stateLabels = {
      'todo': 'Por hacer',
      'progress': 'En progreso',
      'done': 'Hecho',
      'parked': 'Aparcado'
    };

    const delegateOptions = ['Pau', 'Sofi', 'Oscar'];

    // Categorías que siempre existen aunque no tengan tareas (aparecen en el menú y como tarjeta vacía)
    const baseCategories = ['Miami', 'Comercial'];

    // Color por persona asignada (para el avatar de delegación)
    const personColors = {
      'Pau': '#e8896b',
      'Sofi': '#6366f1',
      'Oscar': '#0ea5e9'
    };

    function assigneeBadge(person) {
      if (!person) return '';
      const color = personColors[person] || '#1fa8a6';
      const initial = person.charAt(0).toUpperCase();
      return `<span class="assignee"><span class="assignee-dot" style="background:${color}">${initial}</span>${person}</span>`;
    }

    let currentEditingTask = null;
    let searchTerm = '';

    function init() {
      loadFromLocalStorage();
      setupTabs();
      setupModalEvents();
      setupExport();
      setupNewTaskForm();
      setupSettings();
      setupSearch();
      setGreetingDate();
      render();

      // Permite que la sincronización re-renderice en vivo
      window.tasksUpdated = () => {
        loadFromLocalStorage();
        rebuildCategoryDropdown();
        render();
      };

      // Primer sync inmediato al abrir
      syncTasksFromBackend();
    }

    function setGreetingDate() {
      const el = document.getElementById('greeting-date');
      if (!el) return;
      const fmt = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
      el.textContent = fmt.charAt(0).toUpperCase() + fmt.slice(1);
    }

    function setupSearch() {
      const input = document.getElementById('search-input');
      if (!input) return;
      input.addEventListener('input', (e) => {
        searchTerm = e.target.value.trim().toLowerCase();
        render();
      });
    }

    function filterTasks(list) {
      if (!searchTerm) return list;
      return list.filter(t =>
        (t.title || '').toLowerCase().includes(searchTerm) ||
        (t.category || '').toLowerCase().includes(searchTerm) ||
        (t.delegated || '').toLowerCase().includes(searchTerm)
      );
    }

    function rebuildCategoryDropdown() {
      const select = document.getElementById('task-category-input');
      if (!select) return;
      const current = select.value;
      const categories = [...new Set([...tasks.map(t => t.category), ...baseCategories])].sort();
      select.innerHTML = '<option value="">Seleccionar...</option>';
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });
      select.value = current;
    }

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          e.target.classList.add('active');
          document.getElementById(`tab-${e.target.dataset.tab}`).classList.add('active');
        });
      });
    }

    function setupModalEvents() {
      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', saveTask);
      document.getElementById('modal-delete').addEventListener('click', deleteTask);
      document.querySelector('.modal').addEventListener('click', (e) => {
        if (e.target.id === 'task-modal') closeModal();
      });
    }

    function setupExport() {
      document.getElementById('export-btn').addEventListener('click', exportTasks);
    }

    function setupNewTaskForm() {
      const categories = [...new Set([...tasks.map(t => t.category), ...baseCategories])].sort();
      const select = document.getElementById('task-category-input');
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });

      document.getElementById('add-task-btn').addEventListener('click', addNewTask);
      document.getElementById('task-title-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addNewTask();
      });
    }

    function setupSettings() {
      const savedUrl = localStorage.getItem('telegram-bot-url');
      if (savedUrl) {
        document.getElementById('telegram-bot-url').value = savedUrl;
        checkTelegramStatus(savedUrl);
      }

      document.getElementById('settings-badge').addEventListener('click', () => {
        document.getElementById('settings-modal').classList.add('active');
      });

      document.getElementById('settings-close').addEventListener('click', () => {
        document.getElementById('settings-modal').classList.remove('active');
      });

      document.getElementById('settings-save').addEventListener('click', () => {
        const url = document.getElementById('telegram-bot-url').value.trim();
        if (!url) {
          alert('Ingresa la URL del bot');
          return;
        }
        localStorage.setItem('telegram-bot-url', url);
        checkTelegramStatus(url);
        alert('✅ URL guardada. El dashboard sincronizará automáticamente.');
      });

      document.getElementById('settings-modal').addEventListener('click', (e) => {
        if (e.target.id === 'settings-modal') {
          document.getElementById('settings-modal').classList.remove('active');
        }
      });
    }

    async function checkTelegramStatus(url) {
      try {
        const response = await fetch(`${url}/health`);
        if (response.ok) {
          document.getElementById('telegram-status').innerHTML = '✅ Conectado';
          document.getElementById('telegram-status').style.color = '#1fa8a6';
        }
      } catch (error) {
        document.getElementById('telegram-status').innerHTML = '⚠️ Sin conexión';
        document.getElementById('telegram-status').style.color = '#ff9a44';
      }
    }

    async function addNewTask() {
      const titleInput = document.getElementById('task-title-input');
      const categoryInput = document.getElementById('task-category-input');
      const title = titleInput.value.trim();
      const category = categoryInput.value;

      if (!title || !category) {
        alert('Completa descripción y categoría');
        return;
      }

      const newTask = {
        id: Date.now(),
        category: category,
        title: title,
        state: 'todo',
        delegated: null,
        date: new Date().toISOString().split('T')[0]
      };

      // 1) Aplica local primero (instantáneo)
      tasks.push(newTask);
      saveToLocalStorage();
      render();
      titleInput.value = '';
      categoryInput.value = '';
      titleInput.focus();

      // 2) Empuja al backend para que quede en GitHub (SSOT)
      try {
        const response = await fetch(`${BACKEND_URL}/api/add-task`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: newTask.title,
            category: newTask.category,
            state: newTask.state,
            delegated: newTask.delegated,
            date: newTask.date
          })
        });
        const result = await response.json().catch(() => ({}));
        if (response.ok && result.ok && result.task) {
          // Reemplaza el id local por el id que asignó el backend (para sincronizar bien)
          const idx = tasks.findIndex(t => t.id === newTask.id);
          if (idx !== -1) {
            tasks[idx] = normalizeTask(result.task);
            saveToLocalStorage();
            render();
          }
        } else {
          console.error('Add backend error:', response.status, result);
          showToast('⚠️ Agregada local, pero el servidor no confirmó');
        }
      } catch (e) {
        console.error('Add conexión error:', e.message);
        showToast('⚠️ Agregada local (sin conexión al servidor)');
      }
    }

    function groupByCategory(taskList) {
      return taskList.reduce((acc, task) => {
        if (!acc[task.category]) {
          acc[task.category] = [];
        }
        acc[task.category].push(task);
        return acc;
      }, {});
    }

    function groupByState(taskList) {
      return taskList.reduce((acc, task) => {
        if (!acc[task.state]) {
          acc[task.state] = [];
        }
        acc[task.state].push(task);
        return acc;
      }, {});
    }

    // Paleta de colores por categoría (misma tendencia: teales, azul, naranja, lavanda, coral)
    const categoryPalette = [
      '#1fa8a6', // teal
      '#003d5c', // azul profundo
      '#ff9a44', // naranja
      '#0d7a93', // azul-teal
      '#b8a8c9', // lavanda
      '#6dd4d4', // teal claro
      '#e8896b', // coral
      '#7a9e7e', // salvia
      '#d4a94a', // dorado
      '#9a7aa0'  // malva
    ];

    // Color estable por nombre de categoría (siempre el mismo color para la misma categoría)
    function getCategoryColor(category) {
      let hash = 0;
      for (let i = 0; i < category.length; i++) {
        hash = (hash * 31 + category.charCodeAt(i)) >>> 0;
      }
      return categoryPalette[hash % categoryPalette.length];
    }

    function renderStats() {
      const row = document.getElementById('stats-row');
      if (!row) return;
      const by = s => tasks.filter(t => t.state === s).length;
      const stats = [
        { label: 'Total', value: tasks.length, color: '#1fa8a6', icon: '📋' },
        { label: 'Por hacer', value: by('todo'), color: '#6366f1', icon: '🕒' },
        { label: 'En progreso', value: by('progress'), color: '#0ea5e9', icon: '⚡' },
        { label: 'Hecho', value: by('done'), color: '#10b981', icon: '✅' },
        { label: 'Aparcado', value: by('parked'), color: '#94a3b8', icon: '⏸️' }
      ];
      row.innerHTML = stats.map(s => `
        <div class="stat-tile">
          <div class="stat-icon" style="background:${s.color}1a;color:${s.color}">${s.icon}</div>
          <div>
            <div class="stat-value">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        </div>
      `).join('');
    }

    function render() {
      renderStats();
      renderCategorias();
      renderEstados();
    }

    function renderCategorias() {
      const grid = document.getElementById('categorias-grid');
      grid.innerHTML = '';

      const source = filterTasks(tasks);

      if (source.length === 0) {
        grid.innerHTML = '<div class="empty-state">No hay tareas que coincidan</div>';
        return;
      }

      const byCategory = groupByCategory(source);

      // Incluye las categorías base (Miami, Comercial) aunque estén vacías, salvo al buscar
      const categoryNames = [...new Set([
        ...Object.keys(byCategory),
        ...(searchTerm ? [] : baseCategories)
      ])].sort();

      categoryNames.forEach(category => {
        const categoryTasks = byCategory[category] || [];

        const color = getCategoryColor(category);

        const card = document.createElement('div');
        card.className = 'category-card';
        card.style.borderTop = `3px solid ${color}`;

        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
          <div class="category-indicator" style="background: ${color}"></div>
          <div class="category-name" style="color: ${color}">${category}</div>
          <div class="category-count" style="background: ${color}1a; color: ${color}">${categoryTasks.length}</div>
        `;
        card.appendChild(header);

        if (categoryTasks.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.textContent = 'Sin tareas todavía';
          card.appendChild(empty);
        }

        categoryTasks.forEach(task => {
          const item = document.createElement('div');
          item.className = `task-item state-${task.state}`;
          item.innerHTML = `
            <div class="task-title">${task.title}</div>
            <div class="task-meta">
              <span class="task-state">${stateLabels[task.state]}</span>
              ${assigneeBadge(task.delegated)}
              <span class="task-date">${task.date}</span>
            </div>
          `;
          item.addEventListener('click', () => openModal(task));
          card.appendChild(item);
        });

        grid.appendChild(card);
      });
    }

    function renderEstados() {
      const container = document.getElementById('kanban-container');
      container.innerHTML = '';

      const byState = groupByState(filterTasks(tasks));

      ['todo', 'progress', 'done', 'parked'].forEach(state => {
        const stateTasks = byState[state] || [];

        const column = document.createElement('div');
        column.className = 'kanban-column';

        const header = document.createElement('div');
        header.className = `kanban-header state-${state}`;
        header.innerHTML = `
          <div class="kanban-indicator"></div>
          <span>${stateLabels[state]}</span>
          <div class="kanban-count">${stateTasks.length}</div>
        `;
        column.appendChild(header);

        const cards = document.createElement('div');
        cards.className = 'kanban-cards';

        if (stateTasks.length === 0) {
          cards.innerHTML = '<div class="empty-state">—</div>';
        } else {
          stateTasks.forEach(task => {
            const card = document.createElement('div');
            card.className = `kanban-card state-${state}`;
            card.innerHTML = `
              <div class="kanban-card-title">${task.title}</div>
              <div class="kanban-card-meta">
                <div>${task.category}</div>
                ${assigneeBadge(task.delegated)}
              </div>
            `;
            card.addEventListener('click', () => openModal(task));
            cards.appendChild(card);
          });
        }

        column.appendChild(cards);
        container.appendChild(column);
      });
    }

    function openModal(task) {
      currentEditingTask = task;
      document.getElementById('modal-task-name').textContent = task.title;

      // State buttons
      const stateButtons = document.getElementById('state-buttons');
      stateButtons.innerHTML = '';
      ['todo', 'progress', 'done', 'parked'].forEach(state => {
        const btn = document.createElement('button');
        btn.className = `modal-btn ${task.state === state ? 'selected' : ''}`;
        btn.textContent = stateLabels[state];
        btn.addEventListener('click', () => {
          document.querySelectorAll('#state-buttons .modal-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          task.state = state;
        });
        stateButtons.appendChild(btn);
      });

      // Delegate buttons
      const delegateButtons = document.getElementById('delegate-buttons');
      delegateButtons.innerHTML = '';

      const noneBtn = document.createElement('button');
      noneBtn.className = `modal-btn ${task.delegated === null ? 'selected' : ''}`;
      noneBtn.textContent = 'No delegar';
      noneBtn.addEventListener('click', () => {
        document.querySelectorAll('#delegate-buttons .modal-btn').forEach(b => b.classList.remove('selected'));
        noneBtn.classList.add('selected');
        task.delegated = null;
      });
      delegateButtons.appendChild(noneBtn);

      delegateOptions.forEach(person => {
        const btn = document.createElement('button');
        btn.className = `modal-btn ${task.delegated === person ? 'selected' : ''}`;
        btn.textContent = person;
        btn.addEventListener('click', () => {
          document.querySelectorAll('#delegate-buttons .modal-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          task.delegated = person;
        });
        delegateButtons.appendChild(btn);
      });

      document.getElementById('task-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('task-modal').classList.remove('active');
      currentEditingTask = null;
    }

    async function saveTask() {
      if (!currentEditingTask) return;

      const payload = {
        taskId: currentEditingTask.id,
        title: currentEditingTask.title,
        category: currentEditingTask.category,
        state: currentEditingTask.state,
        delegated: currentEditingTask.delegated,
        date: currentEditingTask.date
      };

      // 1) Aplica local primero (instantáneo, el cambio de estado/delegación se ve al toque)
      saveToLocalStorage();
      render();
      closeModal();

      // 2) Sincroniza con backend en segundo plano (best-effort)
      try {
        const response = await fetch(`${BACKEND_URL}/api/update-task`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          const txt = await response.text();
          console.error('Save backend error:', response.status, txt);
          showToast('⚠️ Guardado local, pero el servidor no confirmó');
        } else {
          console.log('Tarea actualizada en backend:', payload.taskId);
        }
      } catch (e) {
        console.error('Save conexión error:', e.message);
        showToast('⚠️ Guardado local (sin conexión al servidor)');
      }
    }

    async function deleteTask() {
      if (!currentEditingTask) return;

      if (!confirm(`¿Eliminar "${currentEditingTask.title}"?`)) {
        return;
      }

      const taskToDelete = currentEditingTask;
      const taskIndex = tasks.indexOf(taskToDelete);

      if (taskIndex === -1) {
        console.error('Tarea no encontrada en el array');
        return;
      }

      // 1) Aplica local primero (instantáneo, nunca falla)
      tasks.splice(taskIndex, 1);
      saveToLocalStorage();
      render();
      closeModal();

      // 2) Sincroniza con backend en segundo plano (best-effort)
      try {
        const response = await fetch(`${BACKEND_URL}/api/delete-task`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ taskId: taskToDelete.id })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.ok) {
          console.error('Delete backend error:', response.status, result);
          showToast('⚠️ Eliminada local, pero el servidor no confirmó');
        } else {
          console.log('Tarea eliminada del backend:', taskToDelete.id);
        }
      } catch (e) {
        console.error('Delete conexión error:', e.message);
        showToast('⚠️ Eliminada local (sin conexión al servidor)');
      }
    }

    // Notificación no bloqueante (reemplaza los alert que rompían el flujo)
    function showToast(msg) {
      let toast = document.getElementById('snoopy-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'snoopy-toast';
        toast.style.cssText = 'position:fixed;bottom:84px;right:22px;background:#003d5c;color:white;padding:12px 18px;border-radius:12px;font-size:13px;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,0.2);max-width:300px;transition:opacity 0.3s;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 3500);
    }

    function saveToLocalStorage() {
      localStorage.setItem('snoopy-tasks-v3', JSON.stringify(tasks));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('snoopy-tasks-v3');
      if (saved) {
        const loaded = JSON.parse(saved);
        // Solo reemplaza si hay tareas (nunca vaciar por accidente)
        if (Array.isArray(loaded) && loaded.length > 0) {
          tasks.length = 0;
          tasks.push(...loaded.map(normalizeTask));
          return;
        }
      }
      // localStorage vacío: sembrar con las tareas por defecto y guardarlas
      saveToLocalStorage();
    }

    function exportTasks() {
      const csv = [
        ['Categoría', 'Descripción', 'Estado', 'Delegado a', 'Fecha'].join(','),
        ...tasks.map(t => [
          `"${t.category}"`,
          `"${t.title}"`,
          `"${stateLabels[t.state]}"`,
          `"${t.delegated || '—'}"`,
          `"${t.date}"`
        ].join(','))
      ].join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `tareas-export-${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    init();
  </script>
</body>
</html>
