  <script>
    // Sincronizar tareas desde GitHub
    const GITHUB_OWNER = 'sebastianyate-web';
    const GITHUB_REPO = 'snoopy-tasks';
    const GITHUB_RAW = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/tasks.json`;

    async function syncTasksFromGithub() {
      try {
        const response = await fetch(GITHUB_RAW);
        if (!response.ok) return;

        const data = await response.json();
        const remoteTasks = data.tasks || [];
        const localTasks = JSON.parse(localStorage.getItem('snoopy-tasks-v3') || '[]');

        const localIds = new Set(localTasks.map(t => t.id));
        const newTasks = remoteTasks.filter(t => !localIds.has(t.id));

        if (newTasks.length > 0) {
          localTasks.push(...newTasks);
          localStorage.setItem('snoopy-tasks-v3', JSON.stringify(localTasks));
          location.reload(); // Recargar para mostrar nuevas tareas
        }
      } catch (error) {
        console.log('Sync: sin conexión a GitHub');
      }
    }

    setInterval(syncTasksFromGithub, 5000);
  </script>

    ];

    const stateLabels = {
      'todo': 'Por hacer',
      'progress': 'En progreso',
      'done': 'Hecho',
      'parked': 'Aparcado'
    };

    const delegateOptions = ['Pau', 'Sofi', 'Oscar'];
    let currentEditingTask = null;

    function init() {
      loadFromLocalStorage();
      setupTabs();
      setupModalEvents();
      setupExport();
      setupNewTaskForm();
      setupSettings();
      render();
    }

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          e.target.classList.add('active');
          document.getElementById(`tab-${e.target.dataset.tab}`).classList.add('active');
        });
      });
    }

    function setupModalEvents() {
      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', saveTask);
      document.querySelector('.modal').addEventListener('click', (e) => {
        if (e.target.id === 'task-modal') closeModal();
      });
    }

    function setupExport() {
      document.getElementById('export-btn').addEventListener('click', exportTasks);
    }

    function setupNewTaskForm() {
      const categories = [...new Set(tasks.map(t => t.category))].sort();
      const select = document.getElementById('task-category-input');
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });

      document.getElementById('add-task-btn').addEventListener('click', addNewTask);
      document.getElementById('task-title-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addNewTask();
      });
    }

    function setupSettings() {
      const savedUrl = localStorage.getItem('telegram-bot-url');
      if (savedUrl) {
        document.getElementById('telegram-bot-url').value = savedUrl;
        checkTelegramStatus(savedUrl);
      }

      document.getElementById('settings-badge').addEventListener('click', () => {
        document.getElementById('settings-modal').classList.add('active');
      });

      document.getElementById('settings-close').addEventListener('click', () => {
        document.getElementById('settings-modal').classList.remove('active');
      });

      document.getElementById('settings-save').addEventListener('click', () => {
        const url = document.getElementById('telegram-bot-url').value.trim();
        if (!url) {
          alert('Ingresa la URL del bot');
          return;
        }
        localStorage.setItem('telegram-bot-url', url);
        checkTelegramStatus(url);
        alert('✅ URL guardada. El dashboard sincronizará automáticamente.');
      });

      document.getElementById('settings-modal').addEventListener('click', (e) => {
        if (e.target.id === 'settings-modal') {
          document.getElementById('settings-modal').classList.remove('active');
        }
      });
    }

    async function checkTelegramStatus(url) {
      try {
        const response = await fetch(`${url}/health`);
        if (response.ok) {
          document.getElementById('telegram-status').innerHTML = '✅ Conectado';
          document.getElementById('telegram-status').style.color = '#1fa8a6';
        }
      } catch (error) {
        document.getElementById('telegram-status').innerHTML = '⚠️ Sin conexión';
        document.getElementById('telegram-status').style.color = '#ff9a44';
      }
    }

    function addNewTask() {
      const titleInput = document.getElementById('task-title-input');
      const categoryInput = document.getElementById('task-category-input');
      const title = titleInput.value.trim();
      const category = categoryInput.value;

      if (!title || !category) {
        alert('Completa descripción y categoría');
        return;
      }

      const newId = Math.max(...tasks.map(t => t.id), 0) + 1;
      tasks.push({
        id: newId,
        category: category,
        title: title,
        state: 'todo',
        delegated: null,
        date: new Date().toISOString().split('T')[0]
      });

      saveToLocalStorage();
      render();
      titleInput.value = '';
      categoryInput.value = '';
      titleInput.focus();
    }

    function groupByCategory(taskList) {
      return taskList.reduce((acc, task) => {
        if (!acc[task.category]) {
          acc[task.category] = [];
        }
        acc[task.category].push(task);
        return acc;
      }, {});
    }

    function groupByState(taskList) {
      return taskList.reduce((acc, task) => {
        if (!acc[task.state]) {
          acc[task.state] = [];
        }
        acc[task.state].push(task);
        return acc;
      }, {});
    }

    function render() {
      renderCategorias();
      renderEstados();
    }

    function renderCategorias() {
      const grid = document.getElementById('categorias-grid');
      grid.innerHTML = '';

      if (tasks.length === 0) {
        grid.innerHTML = '<div class="empty-state">No hay tareas</div>';
        return;
      }

      const byCategory = groupByCategory(tasks);

      Object.keys(byCategory).sort().forEach(category => {
        const categoryTasks = byCategory[category];

        const card = document.createElement('div');
        card.className = 'category-card';

        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
          <div class="category-indicator" style="background: var(--cat-color, #1fa8a6)"></div>
          <div class="category-name">${category}</div>
          <div class="category-count">${categoryTasks.length}</div>
        `;
        card.appendChild(header);

        categoryTasks.forEach(task => {
          const item = document.createElement('div');
          item.className = `task-item state-${task.state}`;
          item.innerHTML = `
            <div class="task-title">${task.title}</div>
            <div class="task-meta">
              <span class="task-state">${stateLabels[task.state]}</span>
              ${task.delegated ? `<span class="task-delegated">→ ${task.delegated}</span>` : ''}
              <span class="task-date">${task.date}</span>
            </div>
          `;
          item.addEventListener('click', () => openModal(task));
          card.appendChild(item);
        });

        grid.appendChild(card);
      });
    }

    function renderEstados() {
      const container = document.getElementById('kanban-container');
      container.innerHTML = '';

      const byState = groupByState(tasks);

      ['todo', 'progress', 'done', 'parked'].forEach(state => {
        const stateTasks = byState[state] || [];

        const column = document.createElement('div');
        column.className = 'kanban-column';

        const header = document.createElement('div');
        header.className = `kanban-header state-${state}`;
        header.innerHTML = `
          <div class="kanban-indicator"></div>
          <span>${stateLabels[state]}</span>
          <div class="kanban-count">${stateTasks.length}</div>
        `;
        column.appendChild(header);

        const cards = document.createElement('div');
        cards.className = 'kanban-cards';

        if (stateTasks.length === 0) {
          cards.innerHTML = '<div class="empty-state">—</div>';
        } else {
          stateTasks.forEach(task => {
            const card = document.createElement('div');
            card.className = `kanban-card state-${state}`;
            card.innerHTML = `
              <div class="kanban-card-title">${task.title}</div>
              <div class="kanban-card-meta">
                <div>${task.category}</div>
                ${task.delegated ? `<div style="color: #1fa8a6;">→ ${task.delegated}</div>` : ''}
              </div>
            `;
            card.addEventListener('click', () => openModal(task));
            cards.appendChild(card);
          });
        }

        column.appendChild(cards);
        container.appendChild(column);
      });
    }

    function openModal(task) {
      currentEditingTask = task;
      document.getElementById('modal-task-name').textContent = task.title;

      // State buttons
      const stateButtons = document.getElementById('state-buttons');
      stateButtons.innerHTML = '';
      ['todo', 'progress', 'done', 'parked'].forEach(state => {
        const btn = document.createElement('button');
        btn.className = `modal-btn ${task.state === state ? 'selected' : ''}`;
        btn.textContent = stateLabels[state];
        btn.addEventListener('click', () => {
          document.querySelectorAll('#state-buttons .modal-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          task.state = state;
        });
        stateButtons.appendChild(btn);
      });

      // Delegate buttons
      const delegateButtons = document.getElementById('delegate-buttons');
      delegateButtons.innerHTML = '';

      const noneBtn = document.createElement('button');
      noneBtn.className = `modal-btn ${task.delegated === null ? 'selected' : ''}`;
      noneBtn.textContent = 'No delegar';
      noneBtn.addEventListener('click', () => {
        document.querySelectorAll('#delegate-buttons .modal-btn').forEach(b => b.classList.remove('selected'));
        noneBtn.classList.add('selected');
        task.delegated = null;
      });
      delegateButtons.appendChild(noneBtn);

      delegateOptions.forEach(person => {
        const btn = document.createElement('button');
        btn.className = `modal-btn ${task.delegated === person ? 'selected' : ''}`;
        btn.textContent = person;
        btn.addEventListener('click', () => {
          document.querySelectorAll('#delegate-buttons .modal-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          task.delegated = person;
        });
        delegateButtons.appendChild(btn);
      });

      document.getElementById('task-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('task-modal').classList.remove('active');
      currentEditingTask = null;
    }

    function saveTask() {
      if (currentEditingTask) {
        saveToLocalStorage();
        render();
        closeModal();
      }
    }

    function saveToLocalStorage() {
      localStorage.setItem('snoopy-tasks-v3', JSON.stringify(tasks));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('snoopy-tasks-v3');
      if (saved) {
        const loaded = JSON.parse(saved);
        tasks.length = 0;
        tasks.push(...loaded);
      }
    }

    function exportTasks() {
      const csv = [
        ['Categoría', 'Descripción', 'Estado', 'Delegado a', 'Fecha'].join(','),
        ...tasks.map(t => [
          `"${t.category}"`,
          `"${t.title}"`,
          `"${stateLabels[t.state]}"`,
          `"${t.delegated || '—'}"`,
          `"${t.date}"`
        ].join(','))
      ].join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `tareas-export-${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    init();
  </script>
</body>
</html>
